spring:
  application:
    name: backend

  datasource:
    # 파일 기반 H2 — 앱을 재시작해도 수집한 데이터가 유지된다.
    # 나중에 배포할 때 PostgreSQL 등으로 교체 예정.
    url: jdbc:h2:file:./data/sportsinfo
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update   # 개발 단계: 엔티티 변경 시 테이블 자동 반영
    open-in-view: false

  h2:
    console:
      enabled: true      # http://localhost:8080/h2-console 에서 DB 직접 확인 가능
      path: /h2-console

naver:
  sports:
    base-url: https://api-gw.sports.naver.com
    # 수집할 종목 (네이버 upperCategoryId 기준)
    # e스포츠는 이 일정 API에 없고 별도 페이지를 쓰므로 esports-schedule-url로 따로 수집한다.
    categories:
      - kbaseball   # 국내야구 (KBO)
      - wbaseball   # 해외야구 (MLB 등)
      - kfootball   # 국내축구 (K리그)
      - wfootball   # 해외축구 (EPL, 라리가 등)
      - basketball  # 농구 (KBL, NBA)
      - volleyball  # 배구 (V리그)
    # e스포츠 일정 페이지 (LCK 등). __NEXT_DATA__에서 경기를 추출한다.
    esports-schedule-url: https://game.naver.com/esports/schedule

# 리그(categoryId)별 한국 중계 채널 표.
# 네이버가 broadChannel을 주지 않는 경기(MLB, NPB 등)의 중계 정보를 코드로 결정적으로 채운다.
# 중계권은 시즌마다 바뀌므로 여기만 갱신하면 됨 (2026 시즌 기준 best-effort).
broadcast:
  rights:
    kbo:
      channels: [KBS N SPORTS, MBC SPORTS+, SBS SPORTS, SPOTV]
      note: 경기별 분배
    mlb:
      channels: [SPOTV, 쿠팡플레이]
    npb:
      channels: [SPOTV]
    worldcup:
      channels: [KBS, MBC, SBS]
      note: 국가대표 경기 지상파 중계
    epl:
      channels: [쿠팡플레이]
      note: 쿠팡플레이 독점
    laliga:
      channels: [쿠팡플레이]
    bundesliga:
      channels: [쿠팡플레이]
    seriea:
      channels: [쿠팡플레이]
    ligue1:
      channels: [쿠팡플레이]
    championsleague:
      channels: [쿠팡플레이]
      note: UEFA 챔피언스리그
    kleague:
      channels: [쿠팡플레이, SPOTV]
    nba:
      channels: [SPOTV, 쿠팡플레이]
    kbl:
      channels: [SPOTV]
    vleague:
      channels: [SBS SPORTS, KBS N SPORTS]
      note: V리그
    lck:
      channels: [네이버, 치지직, SOOP]
      note: LoL 챔피언스 코리아

# Gemini(무료 등급) 경기 분석 설정.
# 웹검색(Google Search grounding)을 켜서 실제 최신 정보 기반으로 분석한다.
# API 키는 코드에 두지 않고 환경변수 GEMINI_API_KEY로 주입한다(보안).
gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: https://generativelanguage.googleapis.com/v1beta
  # 무료 등급에서 웹검색 grounding이 가능한 Flash 계열 모델.
  # 모델 ID가 바뀌면 이 줄만 수정하면 된다.
  # (Pro 모델은 2026-04 이후 API 무료 등급 제외라 Flash를 쓴다.)
  model: gemini-3.5-flash

logging:
  level:
    com.sportsinfo.backend: debug
